[mypy]
python_version = 3.11
files = gui_app,data_manager,easy_xt,strategies
exclude = (external|myenv|notebooks|学习实例|学习案例|examples|xtquant|\.venv|\\\\\.\\nul)
warn_unused_configs = True
ignore_missing_imports = True
no_implicit_optional = False

[mypy-core.*]
warn_return_any = True
disallow_untyped_defs = True

[mypy-gui_app.*]
warn_return_any = False
disallow_untyped_defs = False
ignore_missing_imports = True

[mypy-strategies.*]
warn_return_any = False
disallow_untyped_defs = False
ignore_missing_imports = True

[mypy-easy_xt.*]
ignore_errors = True

[mypy-xtquant]
ignore_errors = True

[mypy-xtquant.*]
ignore_errors = True

