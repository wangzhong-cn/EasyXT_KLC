repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        types: [python]
      - id: ruff-format
        types: [python]
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        name: bandit security scan
        args: ["-ll", "-ii", "--skip", "B101"]
        types: [python]
  - repo: local
    hooks:
      - id: git-secrets
        name: git-secrets
        entry: git secrets --scan
        language: system
        pass_filenames: false
      - id: bare-except-gate
        name: bare-except CI 门禁（核心目录禁止裸 except）
        entry: python tools/check_bare_except.py --staged
        language: system
        types: [python]
        pass_filenames: false
      - id: mypy
        name: mypy
        entry: mypy
        language: system
        types: [python]
        pass_filenames: false
        args: [--config-file=mypy.ini]
      - id: pytest
        name: pytest
        entry: pytest
        language: system
        types: [python]
        pass_filenames: false
        args: [tests/]
      - id: coverage
        name: coverage check
        entry: coverage run -m pytest tests/ -v
        language: system
        types: [python]
        pass_filenames: false
        stages: [push]

default_stages: [commit, push]
