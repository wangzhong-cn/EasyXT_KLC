name: DuckDB Connection Lint

on:
  push:
    paths:
      - "**/*.py"
  pull_request:
    paths:
      - "**/*.py"

jobs:
  duckdb-connect-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Check bare duckdb.connect() usage (whitelist gate)
        run: python tools/check_duckdb_connect.py
