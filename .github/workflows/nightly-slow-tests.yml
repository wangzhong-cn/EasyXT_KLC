name: Nightly Slow Tests

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  slow-gui-smoke:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run slow integration smoke test
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest tests/test_main_window_engine_status_smoke.py -m slow -q

      - name: Run backtest E2E regression + metrics contract gate
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest tests/test_backtest_e2e_regression.py tests/test_easyxt_backtest_import.py tests/test_duckdb_pool.py::TestCrossProcessWriteLock "tests/test_backtest_widget.py::TestBacktestWidgetMappingContract" --tb=short -v --no-header -q
