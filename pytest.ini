[pytest]
testpaths = tests
python_files = test_*.py
addopts = -v --tb=short
norecursedirs = external myenv notebooks 学习实例 学习案例 examples
# 运行命令备忘：
#   日常单测（无外部依赖）    ：  pytest
#   实盘集成测试（需 MiniQMT）：  pytest -m integration --run-integration
markers =
	slow: 慢速集成测试（建议夜间或预发布流水线执行）
	gui: 需要 Qt 显示器的 GUI 集成测试（headless CI 用 -m 'not gui' 排除）
	integration: 需要外部系统（QMT/MiniQMT/网络）的集成测试，默认 skip，用 --run-integration 开启
	convergence: 收敛规则契约测试（自定义周期 close 对齐 1D 黄金标准）
	base_data: 4 组基础历史数据（Tick/1m/5m/1D）的完整性结构验证
	intraday: 日内自定义周期（2m/5m/10m/…）收敛测试
	multiday: 多日自定义周期（2d/3d/5d/…）左对齐测试
	cross_source: 跨数据源 OHLCV 一致性阈值断言
asyncio_mode = auto
filterwarnings =
	ignore::DeprecationWarning
	ignore::pytest.PytestUnraisableExceptionWarning
